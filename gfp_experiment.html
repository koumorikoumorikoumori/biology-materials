<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GFP遺伝子組換え実験 — バーチャルラボ</title>
<style>
:root{
  --bg:#f4f7fb;--card:#fff;--border:#d4dde8;
  --ink:#16202e;--ink2:#52617a;--ink3:#94a2b8;
  --clone:#2a7048;--clone2:#3a9060;
  --gfp:#28c850;--gfp2:#50e878;--gfpglow:#7dff9e;
  --enz:#8a3098;--enz2:#a850b8;
  --plasmid:#c89020;--plasmid2:#e0a830;
  --uv:#7a30c8;--uv2:#9850e0;
  --gold:#c89020;--ok:#16803c;--ng:#b91c1c;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

#hdr{background:linear-gradient(135deg,#0d2e1a,#1a5c38);color:#fff;padding:18px 24px}
#hdr h1{font-size:1.3rem;font-weight:700;letter-spacing:.03em;margin-bottom:3px}
#hdr p{font-size:.8rem;opacity:.85}

.mission{background:linear-gradient(135deg,#e6f7ec,#d0f0dc);border:2px solid var(--clone);border-radius:10px;margin:16px;padding:16px 20px;display:flex;gap:16px;align-items:center}
.mission-icon{font-size:2.6rem}
.mission h2{font-size:1.05rem;color:var(--clone);margin-bottom:4px;font-weight:700}
.mission p{font-size:.86rem;color:var(--ink2);line-height:1.5}

/* progress bar */
.progress-track{display:flex;gap:4px;padding:0 16px;margin-bottom:8px;flex-wrap:wrap}
.progress-step{flex:1;min-width:90px;text-align:center;padding:8px 4px;border-radius:8px;font-size:.74rem;font-weight:700;background:#e6edf5;color:var(--ink3);border-bottom:3px solid transparent;transition:all .3s}
.progress-step.active{background:var(--clone);color:#fff;border-bottom-color:var(--gold)}
.progress-step.done{background:var(--clone2);color:#fff}

.lab-container{max-width:920px;margin:0 auto;padding:8px 16px 36px}
.lab-stage{background:#0d1a14;border-radius:12px;padding:24px;min-height:340px;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}

.step-title{color:var(--gfp2);font-size:1.05rem;font-weight:700;margin-bottom:6px;text-align:center}
.step-desc{color:#a0c0b0;font-size:.84rem;text-align:center;max-width:560px;margin:0 auto 16px;line-height:1.6}

.bench{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-top:14px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.bench h3{font-size:.98rem;color:var(--clone);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.bench p{font-size:.85rem;color:var(--ink2);line-height:1.65;margin-bottom:8px}
.think{background:#fffbe8;border-left:4px solid var(--gold);padding:10px 14px;border-radius:0 6px 6px 0;font-size:.84rem;color:#6a5010;margin:10px 0}

.btn{padding:10px 22px;border-radius:7px;border:none;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.02em}
.btn-go{background:var(--clone);color:#fff}.btn-go:hover{background:var(--clone2);transform:translateY(-1px)}
.btn-uv{background:var(--uv);color:#fff}.btn-uv:hover{background:var(--uv2)}
.btn-ghost{background:#fff;color:var(--ink2);border:1.5px solid var(--border)}
.btn-ghost:hover{border-color:var(--clone);color:var(--clone)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:center;margin-top:16px}

/* equipment selection */
.equip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin:14px 0}
.equip-card{border:2px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s;background:#fff;user-select:none}
.equip-card:hover{border-color:var(--clone2);transform:translateY(-2px)}
.equip-card.selected{border-color:var(--clone);background:#eafaef;box-shadow:0 0 0 3px rgba(42,112,72,.2)}
.equip-card.correct{border-color:var(--ok);background:#f0fdf4}
.equip-card.wrong{border-color:var(--ng);background:#fef2f2;animation:shake .4s}
.equip-icon{font-size:1.8rem;margin-bottom:4px}
.equip-name{font-size:.76rem;font-weight:600;line-height:1.3}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* SVG areas */
.viz{width:100%;max-width:640px;margin:0 auto}

/* petri dish */
.petri-wrap{display:flex;gap:24px;justify-content:center;flex-wrap:wrap;align-items:center}
.petri{width:200px;height:200px;border-radius:50%;position:relative;border:6px solid rgba(255,255,255,.15);transition:all .6s}
.petri-normal{background:radial-gradient(circle,#e8dcc0,#d4c4a0)}
.petri-label{text-align:center;color:#a0c0b0;font-size:.8rem;margin-top:8px;font-weight:600}
.colony{position:absolute;width:14px;height:14px;border-radius:50%;background:#f0e8d0;border:1px solid #c8b890;transition:all .8s}
.uv-on .colony.gfp{background:var(--gfpglow);box-shadow:0 0 12px var(--gfpglow),0 0 20px var(--gfp2);border-color:var(--gfp)}
.uv-on .petri{background:radial-gradient(circle,#1a1030,#0d0820);box-shadow:0 0 30px rgba(122,48,200,.4)}
.uv-on .petri-uv{filter:brightness(1.1)}

.result-msg{margin-top:14px;padding:12px 16px;border-radius:8px;font-size:.86rem;font-weight:600;line-height:1.6}
.result-ok{background:#f0fdf4;color:var(--ok);border:1.5px solid #86efac}
.result-info{background:#eff6ff;color:#1a5090;border:1.5px solid #93c5fd}
.result-warn{background:#fffbeb;color:#92400e;border:1.5px solid #fbbf24}

.quiz-opt{display:block;width:100%;text-align:left;padding:11px 16px;margin:6px 0;border:1.5px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-size:.86rem;transition:all .2s}
.quiz-opt:hover{border-color:var(--clone2);background:#f4faf6}
.quiz-opt.correct{border-color:var(--ok);background:#f0fdf4;font-weight:600}
.quiz-opt.wrong{border-color:var(--ng);background:#fef2f2}

#ftr{text-align:center;padding:16px;font-size:.72rem;color:var(--ink3);border-top:1px solid var(--border)}
.hidden{display:none}
</style>
</head>
<body>

<div id="hdr">
  <h1>🦠 GFP遺伝子組換え実験 — バーチャルラボ</h1>
  <p>高校生物 バイオテクノロジー 第3時 / オワンクラゲのGFPを大腸菌に導入する</p>
</div>

<div class="mission">
  <div class="mission-icon">🧪</div>
  <div>
    <h2>実験ミッション：大腸菌を光らせろ！</h2>
    <p>オワンクラゲがもつ「緑色蛍光タンパク質（GFP）」の遺伝子を大腸菌に導入し，紫外線で光る大腸菌を作り出す。実験室の手順を1ステップずつ体験しながら，遺伝子組換えのしくみを理解しよう。</p>
  </div>
</div>

<div class="progress-track" id="progress"></div>

<div class="lab-container">
  <div class="lab-stage" id="stage"></div>

  <div class="btn-row" id="controls"></div>

  <!-- bench explanations appear here -->
  <div id="bench-area"></div>
</div>

<div id="ftr">高校生物 バイオテクノロジー 第3時 — GFP遺伝子組換え実験 © 2026</div>

<script>
'use strict';

// ════════════════════════════════════════════════════════
// EXPERIMENT STATE
// ════════════════════════════════════════════════════════
let step = 0;
const TOTAL_STEPS = 6;
const STEP_NAMES = ['① 準備','② 切る','③ つなぐ','④ 入れる','⑤ 培養','⑥ 観察'];

let selectedEquip = [];
let uvOn = false;

// Required equipment for the experiment (correct answers)
const EQUIPMENT = [
  {id:'plasmid', icon:'⭕', name:'プラスミド', correct:true},
  {id:'gfp', icon:'🧬', name:'GFP遺伝子', correct:true},
  {id:'enzyme', icon:'✂️', name:'制限酵素', correct:true},
  {id:'ligase', icon:'🔗', name:'DNAリガーゼ', correct:true},
  {id:'ecoli', icon:'🦠', name:'大腸菌', correct:true},
  {id:'agar', icon:'🍽️', name:'寒天培地', correct:true},
  {id:'microscope', icon:'🔬', name:'光学顕微鏡', correct:false},
  {id:'centrifuge', icon:'🌀', name:'遠心分離機', correct:false},
];

// ════════════════════════════════════════════════════════
// RENDER PROGRESS
// ════════════════════════════════════════════════════════
function renderProgress(){
  const el = document.getElementById('progress');
  el.innerHTML = '';
  STEP_NAMES.forEach((name,i)=>{
    const d = document.createElement('div');
    d.className = 'progress-step' + (i===step?' active':'') + (i<step?' done':'');
    d.textContent = name;
    el.appendChild(d);
  });
}

// ════════════════════════════════════════════════════════
// STEP RENDERERS
// ════════════════════════════════════════════════════════
function renderStep(){
  renderProgress();
  const stage = document.getElementById('stage');
  const controls = document.getElementById('controls');
  const bench = document.getElementById('bench-area');
  stage.className = 'lab-stage' + (uvOn?' uv-on':'');
  controls.innerHTML = '';
  bench.innerHTML = '';

  // STEP 0: 準備 — equipment selection
  if(step === 0){
    stage.innerHTML = `
      <div class="step-title">① 実験の準備：道具を選ぼう</div>
      <div class="step-desc">この実験に<strong>本当に必要な道具</strong>はどれ？ 6つ選んでみよう。（ヒント：第1時で学んだ「切る・つなぐ・入れる・増やす」を思い出して）</div>
      <div class="equip-grid" id="equip-grid"></div>
    `;
    const grid = document.getElementById('equip-grid');
    EQUIPMENT.forEach(e=>{
      const c = document.createElement('div');
      c.className = 'equip-card' + (selectedEquip.includes(e.id)?' selected':'');
      c.innerHTML = `<div class="equip-icon">${e.icon}</div><div class="equip-name">${e.name}</div>`;
      c.onclick = ()=>toggleEquip(e.id);
      grid.appendChild(c);
    });
    controls.innerHTML = `<button class="btn btn-go" onclick="checkEquip()">道具を確認する</button>`;
    bench.innerHTML = `
      <div class="bench">
        <div class="think">💭 考えよう：GFP遺伝子をプラスミドに組み込むには何が要る？ そのプラスミドを大腸菌に入れて増やすには？</div>
      </div>`;
    return;
  }

  // STEP 1: 切る
  if(step === 1){
    stage.innerHTML = `
      <div class="step-title">② 制限酵素で「切る」</div>
      <div class="step-desc">GFP遺伝子と，運び屋のプラスミドを，<strong>同じ制限酵素</strong>で切る。すると同じ形の「のりしろ（粘着末端）」ができる。</div>
      <div class="viz">${svgCut()}</div>
    `;
    controls.innerHTML = `<button class="btn btn-go" onclick="nextStep()">▶ 同じ酵素で切った！次へ</button>`;
    bench.innerHTML = benchBox('🔬 なぜ「同じ」制限酵素を使うの？',
      'GFP遺伝子とプラスミドを同じ制限酵素で切ると，断面の「のりしろ」の形がぴったり一致する。だから後で正しくつながる。違う酵素で切ると，のりしろの形が合わずつなげない。');
    return;
  }

  // STEP 2: つなぐ
  if(step === 2){
    stage.innerHTML = `
      <div class="step-title">③ DNAリガーゼで「つなぐ」</div>
      <div class="step-desc">切ったGFP遺伝子とプラスミドを，<strong>DNAリガーゼ</strong>（のり）でつなぎ合わせる。GFP遺伝子が組み込まれた「組換えプラスミド」が完成！</div>
      <div class="viz">${svgLigate()}</div>
    `;
    controls.innerHTML = `<button class="btn btn-go" onclick="nextStep()">▶ 組換えプラスミド完成！次へ</button>`;
    bench.innerHTML = benchBox('🔗 これが「遺伝子組換え」',
      'GFP遺伝子をプラスミドに組み込んだこの瞬間が，まさに「遺伝子組換え」。自然界にはない，新しい組み合わせのDNA（組換えDNA）ができた。');
    return;
  }

  // STEP 3: 入れる（形質転換）
  if(step === 3){
    stage.innerHTML = `
      <div class="step-title">④ 大腸菌に「入れる」（形質転換）</div>
      <div class="step-desc">組換えプラスミドを大腸菌に取り込ませる。外から来たDNAで性質が変わることを<strong>形質転換</strong>という。</div>
      <div class="viz">${svgTransform()}</div>
    `;
    controls.innerHTML = `<button class="btn btn-go" onclick="nextStep()">▶ 大腸菌が取り込んだ！次へ</button>`;
    bench.innerHTML = benchBox('🦠 形質転換（transformation）',
      '大腸菌に熱ショックなどを与えると，細胞膜のすきまからプラスミドが入り込む。これで大腸菌はGFP遺伝子をもつようになった。');
    return;
  }

  // STEP 4: 培養
  if(step === 4){
    stage.innerHTML = `
      <div class="step-title">⑤ 寒天培地で「培養」する</div>
      <div class="step-desc">形質転換した大腸菌を寒天培地にまいて，一晩培養する。1個の大腸菌が分裂を繰り返し，目に見える集団（<strong>コロニー</strong>）になる。</div>
      <div class="petri-wrap"><div><div class="petri petri-normal" id="petri-culture"></div><div class="petri-label">培養後の寒天培地（明るい光の下）</div></div></div>
    `;
    controls.innerHTML = `<button class="btn btn-go" onclick="growColonies()">▶ 一晩培養する</button>`;
    bench.innerHTML = benchBox('🍽️ コロニーとは',
      '1個の大腸菌が分裂してできた，すべて同じ遺伝子をもつ集団（クローン）。普通の光の下では，GFPをもっていてもまだ白っぽく見える。');
    return;
  }

  // STEP 5: 観察
  if(step === 5){
    stage.innerHTML = `
      <div class="step-title">⑥ 紫外線をあてて「観察」する</div>
      <div class="step-desc">紫外線（UV）ライトをあててみよう。GFP遺伝子が働いている大腸菌のコロニーは…？</div>
      <div class="petri-wrap">
        <div><div class="petri petri-uv" id="petri-observe"></div><div class="petri-label" id="observe-label">紫外線ライト：OFF</div></div>
      </div>
    `;
    controls.innerHTML = uvOn
      ? `<button class="btn btn-ghost" onclick="toggleUV()">紫外線を消す</button><button class="btn btn-go" onclick="nextStep()">▶ 結果を考察する</button>`
      : `<button class="btn btn-uv" onclick="toggleUV()">🔦 紫外線ライトを当てる</button>`;
    renderPetriObserve();
    if(uvOn){
      bench.innerHTML = `<div class="result-msg result-ok">🎉 緑色に光った！ GFP遺伝子が大腸菌の中で読み取られ，緑色蛍光タンパク質が作られた証拠だ。オワンクラゲの遺伝子が，大腸菌の中で「働いている」！</div>`;
    } else {
      bench.innerHTML = benchBox('🔦 GFPの性質',
        'GFP（緑色蛍光タンパク質）は，紫外線や青色光をあてると緑色に光るタンパク質。光るかどうかで「遺伝子が働いているか」が一目でわかる。だから研究の「目印（マーカー）」として大活躍している。');
    }
    return;
  }

  // STEP 6: まとめ・考察クイズ
  if(step === 6){
    stage.innerHTML = `
      <div class="step-title">✅ 実験完了！考察クイズ</div>
      <div class="step-desc">実験を振り返って，理解を確かめよう。</div>
      <div class="viz" style="background:#0d1a14;padding:10px">${svgSummary()}</div>
    `;
    controls.innerHTML = `<button class="btn btn-ghost" onclick="restart()">🔄 もう一度実験する</button>`;
    bench.innerHTML = `
      <div class="bench" id="quiz-bench">
        <h3>🧠 考察クイズ</h3>
        <p><strong>Q. この実験で「大腸菌が緑色に光った」ことから言えるのは？</strong></p>
        <div id="quiz-opts"></div>
        <div id="quiz-feedback"></div>
      </div>`;
    renderQuiz();
    return;
  }
}

// ════════════════════════════════════════════════════════
// EQUIPMENT SELECTION
// ════════════════════════════════════════════════════════
function toggleEquip(id){
  const i = selectedEquip.indexOf(id);
  if(i>=0) selectedEquip.splice(i,1);
  else selectedEquip.push(id);
  renderStep();
}

function checkEquip(){
  const correctIds = EQUIPMENT.filter(e=>e.correct).map(e=>e.id);
  const cards = document.querySelectorAll('.equip-card');
  let allRight = true;
  EQUIPMENT.forEach((e,idx)=>{
    const card = cards[idx];
    const picked = selectedEquip.includes(e.id);
    card.classList.remove('selected');
    if(e.correct && picked){ card.classList.add('correct'); }
    else if(!e.correct && picked){ card.classList.add('wrong'); allRight=false; }
    else if(e.correct && !picked){ card.classList.add('wrong'); allRight=false; }
  });
  const bench = document.getElementById('bench-area');
  if(allRight){
    bench.innerHTML = `<div class="result-msg result-ok">✓ 正解！この6つが必要な道具だ。顕微鏡や遠心分離機はこの実験では使わない（光るかどうかは肉眼＋UVで分かる）。「次へ」で実験開始！</div>`;
    document.getElementById('controls').innerHTML = `<button class="btn btn-go" onclick="nextStep()">▶ 実験を始める</button>`;
  } else {
    bench.innerHTML = `<div class="result-msg result-warn">⚠️ おしい！緑＝必要な道具，赤＝間違い。必要なのは「プラスミド・GFP遺伝子・制限酵素・DNAリガーゼ・大腸菌・寒天培地」の6つ。もう一度選び直そう。</div>`;
  }
}

// ════════════════════════════════════════════════════════
// STEP NAVIGATION
// ════════════════════════════════════════════════════════
function nextStep(){
  if(step < TOTAL_STEPS){ step++; uvOn=false; renderStep(); window.scrollTo({top:0,behavior:'smooth'}); }
}

function growColonies(){
  const petri = document.getElementById('petri-culture');
  if(!petri) return;
  const positions = [[60,50],[110,70],[80,110],[140,120],[50,130],[120,160],[160,90],[90,75],[130,55],[70,160]];
  positions.forEach(([x,y],i)=>{
    setTimeout(()=>{
      const col = document.createElement('div');
      col.className = 'colony gfp';
      col.style.left = x+'px';
      col.style.top = y+'px';
      col.style.transform = 'scale(0)';
      petri.appendChild(col);
      requestAnimationFrame(()=>{ col.style.transform='scale(1)'; });
    }, i*120);
  });
  document.getElementById('controls').innerHTML = '';
  setTimeout(()=>{
    document.getElementById('controls').innerHTML = `<button class="btn btn-go" onclick="nextStep()">▶ コロニーができた！観察へ</button>`;
  }, positions.length*120 + 300);
}

function renderPetriObserve(){
  const petri = document.getElementById('petri-observe');
  if(!petri) return;
  petri.innerHTML = '';
  const positions = [[60,50],[110,70],[80,110],[140,120],[50,130],[120,160],[160,90],[90,75],[130,55],[70,160]];
  positions.forEach(([x,y])=>{
    const col = document.createElement('div');
    col.className = 'colony gfp';
    col.style.left = x+'px';
    col.style.top = y+'px';
    petri.appendChild(col);
  });
}

function toggleUV(){
  uvOn = !uvOn;
  renderStep();
  const label = document.getElementById('observe-label');
  if(label) label.textContent = uvOn ? '紫外線ライト：ON 💡' : '紫外線ライト：OFF';
}

// ════════════════════════════════════════════════════════
// CONSIDERATION QUIZ
// ════════════════════════════════════════════════════════
const QUIZ = {
  q:'この実験で「大腸菌が緑色に光った」ことから言えるのは？',
  opts:[
    {t:'オワンクラゲのGFP遺伝子が，大腸菌の中でも正しく働いてタンパク質を作った',correct:true},
    {t:'大腸菌がオワンクラゲに変化した',correct:false},
    {t:'GFP遺伝子は大腸菌の中では働かないことが分かった',correct:false},
  ],
};
function renderQuiz(){
  const opts = document.getElementById('quiz-opts');
  opts.innerHTML = '';
  QUIZ.opts.forEach((o,i)=>{
    const b = document.createElement('button');
    b.className = 'quiz-opt';
    b.textContent = o.t;
    b.onclick = ()=>answerQuiz(i);
    opts.appendChild(b);
  });
}
function answerQuiz(i){
  const opts = document.querySelectorAll('.quiz-opt');
  const fb = document.getElementById('quiz-feedback');
  QUIZ.opts.forEach((o,idx)=>{
    if(o.correct) opts[idx].classList.add('correct');
    else if(idx===i) opts[idx].classList.add('wrong');
    opts[idx].onclick = null;
  });
  if(QUIZ.opts[i].correct){
    fb.innerHTML = `<div class="result-msg result-ok">🎉 正解！ 遺伝子の「読み取りの仕組み（転写・翻訳）」は，生物の種類が違っても共通している。だからクラゲの遺伝子でも大腸菌の中で働く。これが遺伝子組換えが成り立つ理由だ。</div>`;
  } else {
    fb.innerHTML = `<div class="result-msg result-info">惜しい。大腸菌はクラゲになったわけではない。「GFP遺伝子という設計図」を受け取り，その通りにタンパク質を作っただけ。正しい答えをもう一度確認しよう。</div>`;
  }
}

function restart(){
  step = 0; selectedEquip = []; uvOn = false;
  renderStep();
  window.scrollTo({top:0,behavior:'smooth'});
}
